name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        working-directory: backend
        run: uv python install 3.12

      - name: Export requirements.txt
        working-directory: backend
        run: uv export --no-dev -o requirements.txt

      - name: Build Lambda package
        working-directory: backend
        run: |
          pip install -r requirements.txt -t dist/
          cp -r app dist/
          cp -r lambda_handlers dist/
          cd dist && zip -r ../lambda.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload to S3
        run: |
          aws s3 cp backend/lambda.zip s3://${{ secrets.LAMBDA_ARTIFACTS_BUCKET }}/backend/lambda.zip

      - name: Update Lambda functions
        run: |
          for fn in robops-api robops-telemetry-processor robops-websocket-broadcaster robops-scheduler-trigger; do
            aws lambda update-function-code \
              --function-name $fn \
              --s3-bucket ${{ secrets.LAMBDA_ARTIFACTS_BUCKET }} \
              --s3-key backend/lambda.zip
          done
